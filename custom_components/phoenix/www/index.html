<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix AI Trader</title>
<link rel="stylesheet" href="phoenix.css?v=041">
<style>
.actionbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin:12px 0;flex-wrap:wrap}.action-btn{border:1px solid rgba(56,189,248,.45);background:rgba(15,23,42,.92);color:#e0f2fe;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;cursor:pointer}.action-btn:hover{background:rgba(56,189,248,.18)}.action-btn.reset{border-color:rgba(245,158,11,.55);color:#fed7aa}.action-btn.settings{border-color:rgba(139,92,246,.55);color:#ddd6fe}.action-btn:disabled{opacity:.55;cursor:not-allowed}@media(max-width:700px){.actionbar{justify-content:stretch}.action-btn{width:100%;text-align:center}}
</style>
</head>
<body>
<div class="shell">
  <header class="hero">
    <div>
      <h1>🦅 Phoenix AI Trader</h1>
      <p>Paper Trading con AI per Home Assistant</p>
    </div>
    <span id="licensePill" class="pill">Caricamento...</span>
  </header>

  <div class="notice paper">🧪 Modalità Paper Trading — simulazione virtuale, nessun acquisto reale viene eseguito.</div>
  <div class="actionbar">
    <button id="phoenixResetMissionBtn" class="action-btn reset" type="button">🔄 Reset missione</button>
    <a class="action-btn settings" href="/config/integrations">⚙️ Impostazioni Phoenix</a>
  </div>
  <p id="status" class="status">Caricamento dati Phoenix...</p>
  <main id="app"></main>
</div>
<script src="phoenix.js?v=041"></script>
<script src="phoenix-actions.js?v=001"></script>
</body>
</html>
